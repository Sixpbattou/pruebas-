<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Outer Sync Ring -->
  <path d="M 256,70 A 186,186 0 0,1 420,190 L 390,210 A 146,146 0 0,0 256,110 Z" fill="url(#accent-grad)" opacity="0.8" />
  <path d="M 256,442 A 186,186 0 0,1 92,322 L 122,302 A 146,146 0 0,0 256,402 Z" fill="url(#accent-grad)" opacity="0.8" />
  
  <!-- Sync Arrowheads -->
  <polygon points="420,190 440,140 380,165" fill="url(#accent-grad)" />
  <polygon points="92,322 72,372 132,347" fill="url(#accent-grad)" />

  <!-- Central Fitness Motif: Barbell with Glowing Accent -->
  <g filter="url(#glow)">
    <!-- Barbell Shaft -->
    <rect x="136" y="244" width="240" height="24" rx="12" fill="#ffffff" />
    
    <!-- Outer Plates Left -->
    <rect x="112" y="196" width="24" height="120" rx="12" fill="url(#accent-grad)" />
    <rect x="80" y="216" width="24" height="80" rx="8" fill="#ffffff" opacity="0.9" />
    
    <!-- Outer Plates Right -->
    <rect x="376" y="196" width="24" height="120" rx="12" fill="url(#accent-grad)" />
    <rect x="408" y="216" width="24" height="80" rx="8" fill="#ffffff" opacity="0.9" />

    <!-- Barbell Collar Rings -->
    <rect x="144" y="232" width="12" height="48" rx="6" fill="#e2e8f0" />
    <rect x="356" y="232" width="12" height="48" rx="6" fill="#e2e8f0" />

    <!-- Central Flame/Lightning Dynamic Bolt -->
    <path d="M 256,160 L 226,260 L 270,260 L 256,352 L 286,252 L 242,252 Z" fill="#ffffff" />
  </g>
</svg>
